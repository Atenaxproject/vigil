# Nightly encrypted Supabase backup → private repo Atenaxproject/vigil-backups.
# Zero secrets in this file. Required repo secrets (see docs/build-process/50):
#   SUPABASE_DB_URL        — session-pooler connection string
#   BACKUP_AGE_PUBLIC_KEY  — age recipient public key (private key: password manager ONLY)
#   BACKUP_REPO_TOKEN      — fine-grained PAT scoped to vigil-backups (contents: rw)
name: db-backup

on:
  schedule:
    - cron: '15 7 * * *' # 07:15 UTC nightly
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client age

      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL secret not set — see MANUAL TASKS in docs/build-process/56-security-hardening.md"
            exit 1
          fi
          pg_dump "$SUPABASE_DB_URL" --format=custom --no-owner --file="vigil-$(date +%F).dump"

      - name: Encrypt dump (age) and shred plaintext
        env:
          BACKUP_AGE_PUBLIC_KEY: ${{ secrets.BACKUP_AGE_PUBLIC_KEY }}
        run: |
          age -r "$BACKUP_AGE_PUBLIC_KEY" -o "vigil-$(date +%F).dump.age" "vigil-$(date +%F).dump"
          shred -u "vigil-$(date +%F).dump"

      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          repository: Atenaxproject/vigil-backups
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: vigil-backups

      - name: Commit encrypted backup + apply 30-day retention
        run: |
          mv "vigil-$(date +%F).dump.age" vigil-backups/
          cd vigil-backups
          # Retention: delete .age files older than 30 days
          find . -name '*.dump.age' -mtime +30 -delete
          git config user.name 'vigil-backup-bot'
          git config user.email 'vigil@youthewave.org'
          git add -A
          git commit -m "backup $(date +%F)" || echo 'nothing to commit'
          git push

      - name: Open or update issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
            const today = new Date().toISOString().slice(0, 10)
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100,
            })
            const existing = issues.find((i) => i.title.startsWith('Backup failed'))
            if (existing) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: existing.number,
                body: `Backup failed again on ${today}. Run: ${runUrl}`,
              })
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `Backup failed ${today}`,
                body: `The nightly encrypted database backup failed. Run: ${runUrl}`,
              })
            }
